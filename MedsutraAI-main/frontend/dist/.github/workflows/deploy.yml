name: Deploy to AWS S3

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Sync files to S3
      run: |
        aws s3 sync . s3://${{ secrets.S3_BUCKET }}/ \
          --exclude ".git/*" \
          --exclude ".github/*" \
          --exclude "*.md" \
          --exclude "*.sh" \
          --exclude "*.ps1" \
          --exclude "buildspec.yml" \
          --delete
    
    - name: Set content types
      run: |
        aws s3 cp s3://${{ secrets.S3_BUCKET }}/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
          --content-type "text/html" \
          --metadata-directive REPLACE \
          --cache-control "max-age=300"
        
        aws s3 cp s3://${{ secrets.S3_BUCKET }}/styles.css s3://${{ secrets.S3_BUCKET }}/styles.css \
          --content-type "text/css" \
          --metadata-directive REPLACE \
          --cache-control "max-age=86400"
        
        aws s3 cp s3://${{ secrets.S3_BUCKET }}/app.js s3://${{ secrets.S3_BUCKET }}/app.js \
          --content-type "application/javascript" \
          --metadata-directive REPLACE \
          --cache-control "max-age=86400"
    
    - name: Invalidate CloudFront cache
      if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/*"
    
    - name: Deployment summary
      run: |
        echo "✅ Deployment completed successfully!"
        echo "S3 Bucket: ${{ secrets.S3_BUCKET }}"
        echo "Region: ${{ secrets.AWS_REGION }}"
